worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        # Health check routing for gateway
        location /health {
            return 200 '{"status":"healthy","gateway":"prod"}';
            add_header Content-Type application/json;
        }

        # API Gateway routing to backend microservices inside Render private network
        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://thermos-auth-prod:8001;
            proxy_set_header Host $host;
        }

        location /api/satellite/ {
            rewrite ^/api/satellite/(.*)$ /$1 break;
            proxy_pass http://thermos-satellite-prod:8002;
            proxy_set_header Host $host;
        }

        location /api/predict/ {
            rewrite ^/api/predict/(.*)$ /$1 break;
            proxy_pass http://thermos-prediction-prod:8003;
            proxy_set_header Host $host;
        }

        location /api/simulate/ {
            rewrite ^/api/simulate/(.*)$ /$1 break;
            proxy_pass http://thermos-simulation-prod:8004;
            proxy_set_header Host $host;
        }

        location /api/recommend/ {
            rewrite ^/api/recommend/(.*)$ /$1 break;
            proxy_pass http://thermos-recommendation-prod:8005;
            proxy_set_header Host $host;
        }

        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass http://thermos-chatbot-prod:8006;
            proxy_set_header Host $host;
        }
    }
}
