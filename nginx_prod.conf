worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;

        # Health check routing for gateway
        location /health {
            return 200 '{"status":"healthy","gateway":"prod"}';
            add_header Content-Type application/json;
        }

        # API Gateway routing to backend microservices via their PUBLIC onrender.com URLs.
        # (Free-tier services can't receive Render's private network traffic, so we route
        # over the public internet to each service's own onrender.com subdomain instead.)

        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass https://thermos-auth-prod.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host thermos-auth-prod.onrender.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/satellite/ {
            rewrite ^/api/satellite/(.*)$ /$1 break;
            proxy_pass https://thermos-satellite-prod.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host thermos-satellite-prod.onrender.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/predict/ {
            rewrite ^/api/predict/(.*)$ /$1 break;
            proxy_pass https://thermos-prediction-prod.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host thermos-prediction-prod.onrender.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/simulate/ {
            rewrite ^/api/simulate/(.*)$ /$1 break;
            proxy_pass https://thermos-simulation-prod.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host thermos-simulation-prod.onrender.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/recommend/ {
            rewrite ^/api/recommend/(.*)$ /$1 break;
            proxy_pass https://thermos-recommendation-prod.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host thermos-recommendation-prod.onrender.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass https://thermos-chatbot-prod.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host thermos-chatbot-prod.onrender.com;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
