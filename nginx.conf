worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # Next.js Frontend UI routing
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API Gateway routing to backend microservices
        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://auth-service:8001;
            proxy_set_header Host $host;
        }

        location /api/satellite/ {
            rewrite ^/api/satellite/(.*)$ /$1 break;
            proxy_pass http://satellite-service:8002;
            proxy_set_header Host $host;
        }

        location /api/predict/ {
            rewrite ^/api/predict/(.*)$ /$1 break;
            proxy_pass http://prediction-service:8003;
            proxy_set_header Host $host;
        }

        location /api/simulate/ {
            rewrite ^/api/simulate/(.*)$ /$1 break;
            proxy_pass http://simulation-service:8004;
            proxy_set_header Host $host;
        }

        location /api/recommend/ {
            rewrite ^/api/recommend/(.*)$ /$1 break;
            proxy_pass http://recommendation-service:8005;
            proxy_set_header Host $host;
        }

        location /api/chat/ {
            rewrite ^/api/chat/(.*)$ /$1 break;
            proxy_pass http://chatbot-service:8006;
            proxy_set_header Host $host;
        }
    }
}
