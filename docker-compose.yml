version: '3.8'

services:
  # Databases & Cache
  postgres:
    image: postgis/postgis:15-3.3
    container_name: thermos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thermos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init_postgis.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  mongodb:
    image: mongo:6.0
    container_name: thermos-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: thermos-redis
    ports:
      - "6379:6379"
    restart: always

  # Backend microservices
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermos-auth-service
    command: uvicorn services.authentication-service.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/thermos_db
    depends_on:
      - postgres
    restart: always

  satellite-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermos-satellite-service
    command: uvicorn services.satellite-service.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/thermos_db
    depends_on:
      - postgres
    restart: always

  prediction-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermos-prediction-service
    command: uvicorn services.prediction-service.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/thermos_db
    depends_on:
      - postgres
    restart: always

  simulation-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermos-simulation-service
    command: uvicorn services.simulation-service.main:app --host 0.0.0.0 --port 8004
    ports:
      - "8004:8004"
    restart: always

  recommendation-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermos-recommendation-service
    command: uvicorn services.recommendation-service.main:app --host 0.0.0.0 --port 8005
    ports:
      - "8005:8005"
    restart: always

  chatbot-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thermos-chatbot-service
    command: uvicorn services.chatbot-service.main:app --host 0.0.0.0 --port 8006
    ports:
      - "8006:8006"
    depends_on:
      - redis
    restart: always

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thermos-frontend
    ports:
      - "3000:3000"
    restart: always

  # Nginx Reverse Proxy
  gateway:
    image: nginx:alpine
    container_name: thermos-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - satellite-service
      - prediction-service
      - simulation-service
      - recommendation-service
      - chatbot-service
      - frontend
    restart: always

volumes:
  pgdata:
  mongodata:
